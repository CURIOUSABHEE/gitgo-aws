version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Install dependencies
        - npm ci
        
        # Create .env.production from environment variables
        # This is CRITICAL for Next.js SSR Lambda to access env vars at runtime
        - echo "GITHUB_CLIENT_ID=$GITHUB_CLIENT_ID" >> .env.production
        - echo "GITHUB_CLIENT_SECRET=$GITHUB_CLIENT_SECRET" >> .env.production
        - echo "GITHUB_TOKEN=$GITHUB_TOKEN" >> .env.production
        - echo "LINKEDIN_CLIENT_ID=$LINKEDIN_CLIENT_ID" >> .env.production
        - echo "LINKEDIN_CLIENT_SECRET=$LINKEDIN_CLIENT_SECRET" >> .env.production
        - echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> .env.production
        - echo "NEXTAUTH_SECRET=$NEXTAUTH_SECRET" >> .env.production
        - echo "MONGODB_URI=$MONGODB_URI" >> .env.production
        - echo "CRON_SECRET=$CRON_SECRET" >> .env.production
        - echo "DATABASE_MODE=$DATABASE_MODE" >> .env.production
        - echo "GITGO_AWS_REGION=$GITGO_AWS_REGION" >> .env.production
        - echo "GITGO_EXECUTION_MODE=$GITGO_EXECUTION_MODE" >> .env.production
        - echo "GITGO_S3_BUCKET_NAME=$GITGO_S3_BUCKET_NAME" >> .env.production
        - echo "GROQ_API_KEY=$GROQ_API_KEY" >> .env.production
        - echo "GROQ_API_KEY_1=$GROQ_API_KEY_1" >> .env.production
        - echo "GROQ_API_KEY_2=$GROQ_API_KEY_2" >> .env.production
        - echo "GROQ_API_KEY_3=$GROQ_API_KEY_3" >> .env.production
        - echo "GROQ_API_KEY_ARCHI_1=$GROQ_API_KEY_ARCHI_1" >> .env.production
        - echo "GROQ_API_KEY_ARCHI_2=$GROQ_API_KEY_ARCHI_2" >> .env.production
        - echo "GROQ_API_KEY_FOR_OPEN_SOUCE_FINDING_1=$GROQ_API_KEY_FOR_OPEN_SOUCE_FINDING_1" >> .env.production
        - echo "GROQ_API_KEY_FOR_OPEN_SOUCE_FINDING_2=$GROQ_API_KEY_FOR_OPEN_SOUCE_FINDING_2" >> .env.production
        - echo "GROQ_API_KEY_FOR_OPEN_SOUCE_FINDING_3=$GROQ_API_KEY_FOR_OPEN_SOUCE_FINDING_3" >> .env.production
        
    build:
      commands:
        - npm run build
        
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
      
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
